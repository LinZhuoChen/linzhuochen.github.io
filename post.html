<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading… · Lin-Zhuo Chen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet" media="all" type="text/css"/>
    <link href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons/css/academicons.min.css" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="./images/icons/logo.png">
    <script src="https://kit.fontawesome.com/57fb8d417e.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  </head>

  <body>
    <!-- Top Navigation (matches homepage) -->
    <nav class="top-nav">
      <div class="nav-container">
        <a href="./" class="nav-brand">Lin-Zhuo Chen</a>
        <div class="nav-right">
          <ul class="nav-menu">
            <li><a href="./#home">Home</a></li>
            <li><a href="./#news">News</a></li>
            <li><a href="./#writing">Writing</a></li>
            <li><a href="./#publications">Publications</a></li>
          </ul>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
            <i class="fas fa-moon" id="theme-icon"></i>
          </button>
        </div>
      </div>
    </nav>

    <div class="content">
      <div id="container">
        <a class="post-back" href="./#writing">← Back to writing</a>

        <article class="post-article">
          <header class="post-header">
            <div class="post-header__meta">
              <span id="post-date" class="post-date"></span>
              <span id="post-tag" class="post-tag"></span>
            </div>
            <h1 id="post-title" class="post-title">Loading…</h1>
          </header>
          <div id="post-body" class="post-body">
            <p style="color: var(--color-text-muted);">Loading post…</p>
          </div>
        </article>

        <footer class="site-footer">
          <p>&copy; Lin-Zhuo Chen</p>
        </footer>
      </div>
    </div>

    <!-- Theme toggle -->
    <script>
      const themeToggle = document.getElementById('theme-toggle');
      const themeIcon = document.getElementById('theme-icon');
      const html = document.documentElement;
      function getPreferredTheme() {
        const saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      }
      setTheme(getPreferredTheme());
      themeToggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
      });
    </script>

    <!-- Markdown post loader -->
    <script>
      (async function () {
        const titleEl = document.getElementById('post-title');
        const dateEl  = document.getElementById('post-date');
        const tagEl   = document.getElementById('post-tag');
        const bodyEl  = document.getElementById('post-body');

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('p');

        if (!slug || !/^[a-z0-9-]+$/i.test(slug)) {
          titleEl.textContent = 'Post not found';
          bodyEl.innerHTML = '<p>That post link looks malformed. Go back to <a href="./#writing">writing</a>.</p>';
          return;
        }

        try {
          const res = await fetch('./posts/' + slug + '.md', { cache: 'no-cache' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const raw = await res.text();

          // Parse YAML front matter
          const meta = {};
          let body = raw;
          const fm = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
          if (fm) {
            body = fm[2];
            fm[1].split('\n').forEach(function (line) {
              const m = line.match(/^\s*([A-Za-z][\w-]*)\s*:\s*(.+?)\s*$/);
              if (m) meta[m[1].toLowerCase()] = m[2].replace(/^["']|["']$/g, '');
            });
          }

          const title = meta.title || slug;
          document.title = title + ' · Lin-Zhuo Chen';
          titleEl.textContent = title;
          dateEl.textContent = meta.date || '';
          if (meta.tag) {
            tagEl.textContent = meta.tag;
            tagEl.className = 'post-tag post-tag--' + meta.tag.toLowerCase().replace(/\s+/g, '-');
          } else {
            tagEl.style.display = 'none';
          }

          marked.setOptions({ gfm: true, breaks: false });
          bodyEl.innerHTML = marked.parse(body);

          // Open external links in new tab
          bodyEl.querySelectorAll('a[href^="http"]').forEach(function (a) {
            a.target = '_blank';
            a.rel = 'noopener';
          });
        } catch (e) {
          titleEl.textContent = 'Post not found';
          bodyEl.innerHTML = '<p>The post <code>' + slug + '</code> could not be loaded. ' +
                             'It may have been moved — go back to <a href="./#writing">writing</a>.</p>';
        }
      })();
    </script>
  </body>
</html>
